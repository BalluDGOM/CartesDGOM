<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://unpkg.com/jsts@2.12.1/dist/jsts.min.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: "Marianne", Arial, sans-serif;
      color: #08306B;
    }
    #main {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }
    
    #graph {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #chart {
        flex: 1;
        min-height: 0;
    }

    #legend {
      width: 180px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: flex-start;
    }
    #legend.hidden {
      display: none !important;
    }
    .legend-point-floating {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 10px;
      flex-direction: column;   /* ← ajouté : empile les enfants verticalement */
    }
    /* Le conteneur principal à gauche */
    #sidebar {
      position: fixed;
      top: 10px; /* Aligné sur le haut du layout */
      left: 20px;
      z-index: 10000;
      
      /* On force la barre à faire exactement la même hauteur que le bloc #main */
      /* Si #main prend tout l'écran, tu peux mettre height: calc(100vh - 30px); */
      height: 95vh; /* Ajuste ce pourcentage (ou une valeur en px) selon la hauteur réelle de ton #main */
      
      /* Flexbox vertical */
      display: flex;
      flex-direction: column;
      align-items: left;
      
      /* RÉPARTITION : Pousse la caméra en haut, les options en bas, le texte au milieu */
      justify-content: space-between; 
      
      width: 100px;
    }

    /* Style des boutons (inchangé) */
    #cameraBtn, #togglePanel {
      width: 48px;
      height: 48px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0; /* Empêche les boutons de se déformer si la hauteur est petite */
    }

    #info {
      position: absolute;
      background: orange;
      top: 60px;
      left: 200px;
      border: none;
      font-size: 22px;
    }

   
   
    /* PANEL LATÉRAL */
    #sidePanel {
      position: fixed;
      top: 0;
      right: 0;

      width: 280px;
      height: 100vh;

      background: white;
      box-shadow: -3px 0 15px rgba(0,0,0,0.2);

      transform: translateX(0);
      transition: transform 0.25s ease;

      z-index: 9999;

      display: flex;
      flex-direction: column;

      overflow: hidden;
    }

    /* panneau caché */
    #sidePanel.hidden {
      transform: translateX(100%);
    }

    /* HEADER */
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid #ddd;
    }

    /* CONTENU */
    .panel-content {
      flex: 1;
      overflow-y: auto;

      padding: 10px;

      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .panel-content label, .switch-container label {
      font-size: 10px;
      font-weight: 400;
    }
    .panel-content::-webkit-scrollbar {
      width: 8px;
    }

    .panel-content::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .panel-content::-webkit-scrollbar-thumb {
      background: #bbb;
      border-radius: 4px;
    }

    .panel-content::-webkit-scrollbar-thumb:hover {
      background: #999;
    }

    /* bouton fermer */
    #closePanel {
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
    }

    #legend {
      width: 150px;
      padding: 10px;
     // border-left: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      //align-items: center;
      justify-content: center; /* vertical */
    }
    /* Titre */
    .legend-titre {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        text-align: center;
    }

    /* Conteneur de la légende */
    .legend-list {
        max-height: 300px;          /* hauteur maximale souhaitée */
        overflow-y: auto;           /* barre de défilement verticale si dépassement */
        padding-right: 4px;         /* espace pour la barre de défilement */
    }

    /* Items de légende */
    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;            /* espacement plus compact */
        width: fit-content;
    }

    .legend-text {
        font-size: 10px;
        font-weight: 400;
    }
    /* Texte des options */
   /* .options-text {
        font-size: 8px;
        font-weight: 400;
    }*/

    /* Couleurs et points */
    .legend-color,
    .legend-point {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
    }
    .legend-color {
        border: 1px solid #666;
    }
    .legend-point {
        border-radius: 50%;
    }
   /* .legend-text {
      font-size: 10px;
      font-weight: 400;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border: 1px solid #666;
      flex-shrink: 0;
    }
    .legend-point {
      width: 16px;
      height: 16px; 
      border-radius: 50%;
      flex-shrink: 0;
    }*/
    .js-plotly-plot .modebar {
      top: 40px !important;   /* décale vers le bas */
      right: 50px !important;
    }
    .color-row {
      display: grid;
      grid-template-columns: 130px 44px;
      align-items: center;
      margin-bottom: 8px;
    }

    .color-row > :first-child {
      width: auto;
    }
    .color-row, .checkbox-row {
    display: grid;
    grid-template-columns: 1fr auto;   /* texte à gauche, contrôle à droite */
    align-items: center;                /* alignement vertical */
    gap: 8px;                           /* espace horizontal */
    margin-bottom: 8px;
    }
    /* Alignement du contrôle (color picker ou switch) */
    .color-row input[type="color"], .color-row .switch, .checkbox-row .switch {
    justify-self: end;                 /* pousse le contrôle à droite */
    margin-right: 10px;
    }
   
    
    #textColorPicker, #textColorPickerEPCI, #lineColorPicker, #pointColorPicker, #pointColorPickerEPCI, #pointColorPickerMairies {
      width: 24px;
      height: 24px;
      padding: 0;
      border: 2px solid #ccc;
    }
    #pointColorPicker, #pointColorPickerEPCI, #pointColorPickerMairies {
      border-radius: 50%;
      flex-shrink: 0;
    }
    .separator {
      border: 0;
      border-top: 1px solid #d9d9d9; /* gris clair */
      margin: 8px 0;
    }
    .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    #fontSizeSlider, #fontSizeSliderEPCI {
        flex: 1;
    }

    #fontSizeValue, #fontSizeValueEPCI {
        min-width: 25px;
    }

    .switch-container {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 8px;
    }

    .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
        margin-left: 0px;
    }
  

    .switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        inset: 0;
        cursor: pointer;
        background-color: #ccc;
        border-radius: 24px;
        transition: .2s;
    }

    .slider:before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: .2s;
    }

    input:checked + .slider {
        background-color: #2196F3;
    }

    input:checked + .slider:before {
        transform: translateX(20px);
    }
    .font-size-control {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .options-text { 
        color: #08306B !important; /* Force la couleur bleu foncé au cas où un autre style l'écrase */
        font-size: 10px; 
        min-width: 24px; 
        flex-shrink: 0; 
        display: inline-block; /* Assure que la largeur minimale est respectée */
    }
    .font-size-control label {
        white-space: nowrap;
        flex: 1;
    }

    .font-size-control input[type="range"] {
        flex: 2;
        min-width: 50px;
    }

    .titre {
      font-size: 18px;
      text-align: center;
      margin: 0;
      padding-top: 6px;
      flex: 0 0 auto;
    }

    .notOwner { 
      font-size: 10px;
      text-align: center;
      font-style: italic;
    }

    #showChoropletheDetails, #showCommuneTextDetails, #showMairiePointDetails,  #showEPCITextDetails , #showCommunePointDetails, #showEPCIPointDetails  {
        margin-left: 0.8rem;
    }
    .hidden { display:none; }
  </style>
</head>

<body>
<div id="main">
  <div id="info"></div>
  <div class="titre" id="titre"></div>
  <div id="graph">
    <div id="chart"></div>
    <div id="legend"></div>
  </div>
</div>
<div id="sidebar">
  <button id="cameraBtn" title="Exporter la carte">📷</button> 
  
  <button id="togglePanel" title="Options">⚙️</button>
</div>
<div id="sidePanel" class="hidden">

  <div class="panel-header">
    <b>Options</b>
    <button id="closePanel">✕</button>
  </div>

  <div class="panel-content">
    <select id="territoireSelect"></select>
    <div class="checkbox-row">
      <label>
          <input type="checkbox" id="showChoropletheValue" >
          Afficher la choroplèthe
      </label>
    </div>
    <div id="showChoropletheDetails">
      <div class="color-row">
        <label for="lineColorPicker">Couleur des lignes :</label>
        <input type="color" id="lineColorPicker" value="#000000">
      </div>
      <div class="font-size-control">
        <label for="lineWidthSlider">Épaisseur de la ligne :</label>
        <input type="range" id="lineWidthSlider" min="0" max="30" value="1">
        <span id="lineWidthValue" class="options-text">1</span>
      </div>
      <div class="checkbox-row" style="margin-top: 8px; ">
        <label>
            <input type="checkbox" id="showHoverInfo" >
            Montrer les informations au survol
        </label>
      </div>
      
    </div>
    <hr class="separator">
    <b>Communes</b>
    <div class="checkbox-row">
      <label>
          <input type="checkbox" id="showTextValue">
          Afficher le nom des communes
      </label>
    </div>
    <div id="showCommuneTextDetails">
      <div class="checkbox-row">
        <label>
            <input type="checkbox" id="showTextValueMairies" >
            À l'emplacement de la mairie
        </label>
      </div>
      <div class="font-size-control">
          <label for="fontSizeSlider">Taille du texte :</label>
          <input type="range" id="fontSizeSlider" min="6" max="30" value="12">
          <span id="fontSizeValue" class="options-text">12</span>
      </div>
      <div class="color-row">
          <label for="textColorPicker">Couleur du texte :</label>
          <input type="color" id="textColorPicker" value="#000000">
      </div>
    </div>
    <div class="checkbox-row">
      <label>
          <input type="checkbox" id="showPointsValue">
          Afficher les points des communes <br/>(centre de la commune, taille en fonction de "ValeurPointCommune")
      </label>
    </div>
    <div id="showCommunePointDetails">
      <div class="checkbox-row">
        <label>
            <input type="checkbox" id="showPointValueMairies" >
            À l'emplacement de la mairie
        </label>
      </div>
      <div class="font-size-control">
          <label for="pointSizeSlider">Taille du point :</label>
          <input type="range" id="pointSizeSlider" min="1" max="6" value="3">
          <span id="pointSizeValue" class="options-text">12</span>
      </div>
      <div class="color-row">
          <label for="pointColorPicker">Couleur des points :</label>
          <input type="color" id="pointColorPicker" value="#000000">
      </div>
    </div>
    <div class="checkbox-row">
      <label>
          <input type="checkbox" id="showPointsValueMairies" >
          Afficher les points des mairies <br/>(emplacement de la mairie, valeur fixe)
      </label>
    </div>
    <div id="showMairiePointDetails">
      <div class="font-size-control">
          <label for="pointSizeSliderMairies">Taille du point :</label>
          <input type="range" id="pointSizeSliderMairies" min="1" max="6" value="3">
          <span id="pointSizeValueMairies" class="options-text">12</span>
      </div>
      <div class="color-row">
          <label for="pointColorPickerMairies">Couleur des points :</label>
          <input type="color" id="pointColorPickerMairies" value="#000000">
      </div>
    </div>
    <hr class="separator">
    <b>Regroupements</b> 
     <div class="checkbox-row">
      <label>
          <input type="checkbox" id="showTextValueEPCI" >
          Afficher le nom des EPCI
      </label>
    </div>
    <div id="showEPCITextDetails" >
      <div class="font-size-control">
          <label for="fontSizeSliderEPCI">Taille du texte :</label>
          <input type="range" id="fontSizeSliderEPCI" min="6" max="30" value="12">
          <span id="fontSizeValueEPCI" class="options-text">12</span>
      </div>
      <div class="color-row">
          <label for="textColorPickerEPCI">Couleur du texte :</label>
          <input type="color" id="textColorPickerEPCI" value="#000000">
      </div>
    </div>
    <div class="checkbox-row">
      <label for="showPointsValueEPCI">
          <input type="checkbox" id="showPointsValueEPCI" >
          Afficher les points des EPCI  <br/>(centre de l'EPCI, taille en fonction de "ValeurPointEPCI")
      </label>
    </div>
    <div id="showEPCIPointDetails">
      <div class="font-size-control">
          <label for="pointSizeSliderEPCI">Taille du point :</label>
          <input type="range" id="pointSizeSliderEPCI" min="1" max="6" value="3">
          <span id="pointSizeValueEPCI" class="options-text">12</span>
      </div>
      <div class="color-row">
          <label for="pointColorPickerEPCI">Couleur des points :</label>
          <input type="color" id="pointColorPickerEPCI" value="#000000">
      </div>
    </div>
    <hr class="separator">
    
    <div class="color-row" >
      <span class="options-text">Afficher le fond</span>
      <label class="switch">
          <input type="checkbox" id="showMap">
          <span class="slider"></span>
      </label>
    </div>   
    <div class="color-row" >
      <span class="options-text">Utiliser la carte DGOM</span>
      <label class="switch">
          <input type="checkbox" id="DGOMMap">
          <span class="slider"></span>
      </label>
    </div>  
    <div class="checkbox-row">
      <span class="options-text">Montrer la géographie <br/>(nom des îles)</span>
      <label class="switch">
          <input type="checkbox" id="showGeo">
          <span class="slider"></span>
      </label>
    </div> 
    <hr class="separator">
    <button id="saveMetricBtn">
      Enregistrer dans la métrique
    </button>
    <span id="notOwner" class="notOwner" >Vous n'avez pas la permission d'enregistrer d'options sur cette métrique</span>

  </div>

</div>
<script>
grist.ready({
  requiredAccess: 'full',
  requiredColumns: [
    { name: "Metrique", type: "Any", title: "Métrique" },
    { name: "indId1", type: "Int", title: "IndicateurId1" },
    { name: "indId2", type: "Int", title: "IndicateurId2" },
    { name: "indId3", type: "Int", title: "IndicateurId3" },
    { name: "TitreLegende", type: "Any", title: "Titre de la légende" },
    { name: "EPCIestLaLegende", type: "Bool", title: "EPCIestLaLegende" },

    { name: "AfficherNomCommunes", type: "Bool", title: "Afficher Nom Communes" },
    { name: "AfficherNomMairies", type: "Bool", title: "Afficher Nom Mairies" },
    { name: "AfficherNomEPCI", type: "Bool", title: "Afficher Nom EPCI" },
    
    { name: "AfficherPointsCommunes", type: "Bool", title: "Afficher Points Communes" },

    { name: "DimensionPtEPCI", type: "Any", title: "Dimension Points EPCI" },
    
    { name: "Type", type: "Any", title: "Type" },
    { name: "Seuil1", type: "Numeric", title: "Seuil 1" },

    { name: "TailleTexteEPCI", type: "Numeric", title: "Taille Texte EPCI" },

    { name: "TaillePointEPCI", type: "Numeric", title: "Taille Point EPCI" },
    { name: "CouleurPointEPCI", type: "Any", title: "Couleur Point EPCI" },
    
    { name: "CouleurLigne", type: "Any", title: "Couleur Ligne" },
    { name: "EpaisseurLigne", type: "Numeric", title: "Epaisseur Ligne" },
    { name: "SurvolCarte", type: "Bool", title: "Infos au survol" },
    { name: "MontrerLeFond", type: "Bool", title: "Montrer le Fond" },
    { name: "CarteDGOM", type: "Bool", title: "Carte DGOM" },
    { name: "Entite", type: "Any", title: "Entité" },
    { name: "AfficherGeographie", type: "Bool", title: "Afficher Géographie" }
  ]
});

let baseUrl;
let territoire;
let franceAll = false;
let dataRecords = [];
let territoireRows = [];

let pendingSelectedValue = null;
let metrique;
let metriqueNom;
let titreLegende;
let EPCIestLaLegende;
let showChoroplethe;
let showText;
let showTextMairies;
let showPointsAtMairies;

syncShowMap();
// Mise à jour à chaque changement de l’état de DGOMMap
DGOMMapSwitch.addEventListener('change', syncShowMap);
openBtn.addEventListener("click", () => {
  const hidden = panel.classList.toggle("hidden");
  openBtn.text = hidden ? "Ouvrir les options" : "Fermer les options";
});

closeBtn.addEventListener("click", () => {
  panel.classList.add("hidden");
});
window.addEventListener("resize", () => {
  Plotly.Plots.resize(document.getElementById("chart"));
});

document.getElementById("cameraBtn").addEventListener("click", async () => {
  const chartDiv = document.getElementById("chart");
  const target = document.getElementById("main");

  try {
    // 1. On demande à Plotly de générer l'image PNG de la carte seule
    const plotlyImageData = await Plotly.toImage(chartDiv, {
      format: 'png',
      width: chartDiv.offsetWidth,
      height: chartDiv.offsetHeight,
      imageDataOnly: false
    });

    // 2. On crée l'image temporaire
    const tempImg = document.createElement('img');
    tempImg.src = plotlyImageData;
    tempImg.style.width = '100%';
    tempImg.style.height = '100%';
    tempImg.style.position = 'absolute'; // On la positionne par-dessus
    tempImg.style.top = '0';
    tempImg.style.left = '0';
    tempImg.style.zIndex = '100'; // Devant le graphique
    tempImg.id = 'temp-plotly-img';

    // On s'assure que le container sait accueillir l'absolute
    const originalPosition = chartDiv.style.position;
    if (!originalPosition || originalPosition === 'static') {
      chartDiv.style.position = 'relative';
    }

    // 3. On AJOUTE l'image par-dessus et on cache le vrai graphique proprement
    // (On ne touche PAS au innerHTML, on cache juste les éléments internes de Plotly)
    const plotlyMainSvg = chartDiv.querySelector('.js-plotly-plot');
    if (plotlyMainSvg) plotlyMainSvg.style.visibility = 'hidden'; 
    chartDiv.appendChild(tempImg);

    // 4. On laisse un tout petit délai pour le DOM
    await new Promise(resolve => setTimeout(resolve, 100));

    // Capture html2canvas
    const canvas = await html2canvas(target, {
      backgroundColor: "#ffffff",
      scale: 1,
      useCORS: true,
      allowTaint: true
    });

    // 5. RESTAURATION : On retire l'image et on réaffiche le Plotly intact
    const imgToRemove = document.getElementById('temp-plotly-img');
    if (imgToRemove) imgToRemove.remove();
    
    if (plotlyMainSvg) plotlyMainSvg.style.visibility = 'visible';
    chartDiv.style.position = originalPosition;

    // Optionnel mais recommandé pour rafraîchir le layout de la carte
    Plotly.Plots.resize(chartDiv);

    // 6. Téléchargement
    const image = canvas.toDataURL("image/png");
    const imageName = "Carte-" + metriqueNom + "-" + territoire + ".png";
    downloadImage(image, imageName);

  } catch (error) {
    console.error("Erreur lors de l'export :", error);
  }
});

async function loadGeoJson(geoJsonCell) {
  const attachments =
  await grist.docApi.fetchTable("_grist_Attachments");
  try {
    const attachmentId = geoJsonCell[1];
        const url = `${baseUrl}/attachments/${attachmentId}/download?auth=${token}`;
        const response = await fetch(url);

        const geojson = await response.json();

        return geojson;
        
      } catch (error) {
        console.error("Error downloading or encoding image:", error);
      }
}

  console.log("Refreshmap : ", dataRecords)

  console.log("recordsTerr : ", recordsTerr)

  }

  const latCentreCarte = DGOMMap ? (geoRow.latCentreCarteDGOM ? geoRow.latCentreCarteDGOM : geoRow.latCentreCarte) : geoRow.latCentreCarte;
  const longCentreCarte = DGOMMap ? (geoRow.longCentreCarteDGOM ? geoRow.longCentreCarteDGOM : geoRow.longCentreCarte) : geoRow.longCentreCarte;  
  const zoomCarte = DGOMMap ? (geoRow.zoomCarteDGOM ? geoRow.zoomCarteDGOM : geoRow.zoomCarte) : geoRow.zoomCarte ;   

  const geoJsonDGOMSafe = geoRow.geoJsonDGOM ? geoRow.geoJsonDGOM : geoRow.geoJson
  let geoJsonCell
  if (franceAll) { //France entière => carte DGOM
    geoJsonCell = geoRow.geoJson
    DGOMMapSwitch.checked = true;
    DGOMMap = true ;
    syncShowMap();
  } else {
    geoJsonCell = DGOMMap ? geoJsonDGOMSafe : geoRow.geoJson ; 
  }

  const geojson = await loadGeoJson(geoJsonCell);
  delete geojson.crs
  let cleanedGeojson = geojson;
  if (validateGeoJSON(geojson).length > 0) {
    cleanedGeojson = fixGeoJSON(geojson);
    validateGeoJSON(cleanedGeojson)
  } 
  let records1 = null
  let records2 = null
  let records3 = null

    records1 = recordsTerr.filter(r => Number(r.Indicateur) === Number(metrique.IndId1))
  } 
  if (metrique.IndId2) {
    records2 = recordsTerr.filter(r => (Number(r.Indicateur) === Number(metrique.IndId2)) && (r.porteeValeur === 'Commune'))  } 
  if (metrique.IndId3) {
    records3 = recordsTerr.filter(r => (Number(r.Indicateur) === Number(metrique.IndId3)) && (r.porteeValeur === 'EPCI'))
  } 

  /*console.log("records1 : " + metrique.IndId1)
  console.log("records1", records1)
  console.log("records2 : " + metrique.IndId2)
  console.log("records2", records2)
  console.log("records3 : " + metrique.IndId3)
  console.log("records3", records3)*/
  //const colorsSet = [...new Set(records1.map(r => Number(r.Valeur)))].sort((a, b) => a - b); // a priri inutile vu qu'on fixe dorénavant le nombre de catégories
  //const colorscale = metriqueCouleurCat ? buildColorscale(colorsSet) : metriqueType; 
  const colorscale = metriqueCouleurCat ? buildColorscale(metriqueCouleurCat.split(',').length) : metriqueType; 
  const traces = [];     
  /*console.log("colorscale", colorscale)   
  console.log("metriqueCouleurCat", metriqueCouleurCat)   */
  let standard = metriqueType !== "Seuils" && metriqueType !== "Categorie"
  let colorbarConfig
  if (standard) { 
    const titleText = titreLegende ? titreLegende : (metriqueNom || "");
    
    // Configuration de la colorbar dans la trace de votre choroplèthe Plotly
    // Note : appliquez cette configuration à la trace de votre choroplèthe (ex: traceChoroplethe)
   colorbarConfig = {
      title: {
        text: `<b>${titleText}</b>`,
        side: "top", // Place le titre juste au-dessus de la barre
        font: {
          family: "Marianne, Arial, sans-serif",
          size: 12,
          color: "#08306B"
        }
      },
      thickness: 15,
      len: 0.6, // Hauteur de la barre (60% de la hauteur de la carte)
      x: 0.90,  // Positionnement à droite
      y: 0.6,
      ticklen: 5,
      tickformat: ",d",
      tickcolor: "#FFFFFF",
    };
  }

  // Couche choroplethe fond (communes sans data)
      // 1. On trouve les codes INSEE du territoire qui N'ONT PAS de données dans records
    const codesAvecData = new Set(records1.map(r => String(r.Code_Insee)));
    //console.log("codesAvecData " , codesAvecData)
    const codesTerritoireSansData = geoRow.codes_insee_communes.filter(code => {
      if (typeof code !== 'number' && typeof code !== 'string') return false;
      return !codesAvecData.has(String(code));
    });

    if (showChoroplethe && codesTerritoireSansData.length > 2) {
      let fondChoropleth = {
        type: 'choroplethmapbox',
        geojson: cleanedGeojson,
        locations: codesTerritoireSansData, // Uniquement les communes vides
        featureidkey: 'properties.code_insee',

          [1, couleurFond]

        showscale: false,
        hoverinfo: 'skip',
        marker: {
          line: {
            color: lineColor,
            width: lineWidth / 10
          }
        }
      };
      traces.push(fondChoropleth);
    }
  
  // --- COUCHES CHOROPLETHE (MAPBOX) ---
  if (showChoroplethe) {
    let baseChoropleth = {
    type: 'choroplethmapbox', // Changement ici
    geojson: cleanedGeojson,
    locations: records1.map(r => String(r.Code_Insee)),
    featureidkey: 'properties.code_insee',
    colorscale: colorscale,
    colorbar: standard ? colorbarConfig : false,
    showscale: standard ? true : false,
    zmin: 1,  
    zmax: metriqueCouleurCat.split(',').length,
    showscale: false,
    hoverinfo: showHoverInfo ? 'text' : 'skip',
    text: records1.map(r => `${r.NomCommune} : ${fmt.format(r.Valeur)}`),
    marker: {
      line: {
        color: lineColor,
        width: lineWidth/10
        }
      }
    };
  
    //console.log('metriqueType', metriqueType)
    if (metriqueType === "Categorie") {
      baseChoropleth.z = records1.map(r => Number(r.Valeur));
      traces.push(baseChoropleth);
    } else if (metriqueType === "Seuils") {
      baseChoropleth.z = records1.map(r => {
        const v = Number(r.Valeur);
        if (v < metriqueSeuil1) return 1;
        if (v <= metriqueSeuil2) return 2;
        return 3;
      });
      traces.push(baseChoropleth);
    } else {
      baseChoropleth.z = records1.map(r => {
        const v = Number(r.Valeur);
        return v;
      });
      baseChoropleth.colorscale = metriqueType;
      baseChoropleth.showscale = true;
      traces.push(baseChoropleth);
    }
  }
  

  // --- COUCHE POINTS COMMUNES (MAPBOX) ---
  if (showPoints && records2) {
    let maxValue;
    let markerSizes;
    maxValue = Math.max(...records2.map(r => Number(r.Valeur)));
    markerSizes = records2.map(r =>
    Math.sqrt(Number(r.Valeur) / maxValue) * 40 * pointSize / 3 );
    
    traces.push({
      type: 'scattermapbox',
      lon:  franceAll ? records2.map(r => Number(r.longDGOM2)) : showPointsAtMairies ? (DGOMMap ? records2.map(r => Number(r.longMairieDGOM)) : records2.map(r => Number(r.longMairie)) ) : (DGOMMap ? records2.map(r => Number(r.longDGOM)) : records2.map(r => Number(r.long)) ),
      lat: franceAll ? records2.map(r => Number(r.latDGOM2)) : showPointsAtMairies ? (DGOMMap ? records2.map(r => Number(r.latMairieDGOM)) : records2.map(r => Number(r.latMairie)) ) : (DGOMMap ? records2.map(r => Number(r.latDGOM)) : records2.map(r => Number(r.lat)) ),
      mode: 'markers',
      showlegend: false, 
      marker: {
        size: markerSizes,
        color: pointColor,
        opacity: 0.7,
        line: { width: 1, color: 'white' } 
      },
      text: records2.map(r => `${r.NomCommune}<br>${textPointsUnit} : ${fmt.format(r.Valeur)}`),
      hovertemplate: '%{text}<extra></extra>'
    });
  }

  // --- COUCHE POINTS Mairie  ---
  if (showPointsMairies) {    
    traces.push({
      type: 'scattermapbox', 
      lon: DGOMMap ? recordsTerr.map(r => Number(r.longMairieDGOM)) : recordsTerr.map(r => Number(r.longMairie)),

  // --- COUCHE POINTS EPCI (MAPBOX) ---

        size: markerSizesEPCI,

      text: uniqueRecords.map(r => `${r.NomEPCI}<br>${textPointsUnitEPCI} : ${fmt.format(r.Valeur)}`),
      hovertemplate: '%{text}<extra></extra>'
    });

  // --- COUCHE TEXTE COMMUNES (MAPBOX) ---
  if (showText) {    
    traces.push({

function buildColorscale(nbCat) { 
  const colors = metriqueCouleurCat.split(',');

  //console.log('metriqueType',metriqueType)
  //console.log('list',liste)
  if (metriqueType === "Seuils") { 
    const n=3
    for (let i = 0; i < n; i++) {
      const start = i / n;
      const end = (i + 1) / n;
      scale.push([start, colors[i]]);
      scale.push([end, colors[i]]);
    }
    return scale; 
  }
  if (metriqueType === "Categorie") {
    const n = nbCat ; // liste.length; 
    for (let i = 0; i < n; i++) {
      const start = i / n;
      const end = (i + 1) / n;

      scale.push([start, colors[i]]);
      scale.push([end, colors[i]]);
    }
    return scale; 
  }
  
}

function validateGeoJSON(fc) {
  const errors = [];

  fc.features.forEach((feature, index) => {
    const result = validateFeature(feature);
    if (!result.valid) {
      errors.push({
        feature: index,
        ...result
      });
    }
    
  });
  return errors;
}

function cleanGeoJSON(fc) {
  return {
    ...fc,
    features: fc.features.map(feature => {
      if (!feature.geometry) return feature;
      
      if (feature.geometry.type === 'Polygon') {
        return {
          ...feature,
          geometry: {
            ...feature.geometry,
            // Garder uniquement le premier ring (contour extérieur)
            coordinates: [feature.geometry.coordinates[0]]
          }
        };
      }
      
      if (feature.geometry.type === 'MultiPolygon') {
        return {
          ...feature,
          geometry: {
            ...feature.geometry,
            coordinates: feature.geometry.coordinates.map(polygon => [polygon[0]])
          }
        };
      }
      
      return feature;
    })
  };
}

function ringArea(coords) {
  let area = 0;
  for (let i = 0; i < coords.length - 1; i++) {
    area += (coords[i][0] * coords[i+1][1]) - (coords[i+1][0] * coords[i][1]);
  }
  return area / 2;
}

function fixPolygonWindings(coordinates) {
  return coordinates.map((ring, index) => {
    const area = ringArea(ring);
    if (index === 0 && area < 0) return [...ring].reverse(); // extérieur = CCW
    if (index > 0 && area > 0) return [...ring].reverse();   // trou = CW
    return ring;
  });
}

function fixGeoJSON(fc) {
  return {
    ...fc,
    features: fc.features.map(feature => {
      if (!feature.geometry) return feature;

      if (feature.geometry.type === 'Polygon') {
        return {
          ...feature,
          geometry: {
            ...feature.geometry,
            coordinates: fixPolygonWindings(feature.geometry.coordinates)
          }
        };
      }

      if (feature.geometry.type === 'MultiPolygon') {
        return {
          ...feature,
          geometry: {
            ...feature.geometry,
            coordinates: feature.geometry.coordinates.map(fixPolygonWindings)
          }
        };
      }

      return feature;
    })
  };
}


function validateFeature(feature) {
  try {
    const reader = new jsts.io.GeoJSONReader();
    const geom = reader.read(feature.geometry);

    const validator = new jsts.operation.valid.IsValidOp(geom);

    const error = validator.getValidationError();

    if (error) {
      return {
        valid: false,
        message: error.getMessage(),
        coordinate: error.getCoordinate()
      };
    }

    return { valid: true };

  } catch (e) {
    return {
      valid: false,
      message: e.message
    };
  }
}
