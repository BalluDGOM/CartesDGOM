<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://unpkg.com/jsts@2.12.1/dist/jsts.min.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: "Marianne", Arial, sans-serif;
      color: #08306B;
    }
    #main {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }
    
    #graph {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #chart {
        flex: 1;
        min-height: 0;
    }

    #legend {
      width: 180px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: flex-start;
    }

    /* Le conteneur principal à gauche */
    #sidebar {
      position: fixed;
      top: 10px; 
      left: 20px;
      z-index: 10000;
      
      /* On force la barre à faire exactement la même hauteur que le bloc #main */
      /* Si #main prend tout l'écran, tu peux mettre height: calc(100vh - 30px); */
      height: 95vh; /* Ajuste ce pourcentage (ou une valeur en px) selon la hauteur réelle de ton #main */
      
      /* Flexbox vertical */
      display: flex;
      flex-direction: column;
      align-items: left;
      justify-content: space-between; 
      
      width: 100px;
    }

    /* Style des boutons (inchangé) */
    #cameraBtn, #togglePanel {
      width: 48px;
      height: 48px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0; /* Empêche les boutons de se déformer si la hauteur est petite */
    }

    #info {
      position: absolute;
      background: orange;
      top: 60px;
      left: 200px;
      border: none;
      font-size: 22px;
    }

   
   
    /* PANEL LATÉRAL */
    #sidePanel {
      position: fixed;
      top: 0;
      right: 0;

      width: 280px;
      height: 100vh;

      background: white;
      box-shadow: -3px 0 15px rgba(0,0,0,0.2);

      transform: translateX(0);
      transition: transform 0.25s ease;

      z-index: 9999;

      display: flex;
      flex-direction: column;

      overflow: hidden;
    }

    /* panneau caché */
    #sidePanel.hidden {
      transform: translateX(100%);
    }

    /* HEADER */
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid #ddd;
    }

    /* CONTENU */
    .panel-content {
      flex: 1;
      overflow-y: auto;

      padding: 10px;

      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .panel-content label, .switch-container label {
      font-size: 10px;
      font-weight: 400;
    }
    .panel-content::-webkit-scrollbar {
      width: 8px;
    }

    .panel-content::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .panel-content::-webkit-scrollbar-thumb {
      background: #bbb;
      border-radius: 4px;
    }

    .panel-content::-webkit-scrollbar-thumb:hover {
      background: #999;
    }

    /* bouton fermer */
    #closePanel {
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
    }

    #legend {
      width: 150px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      //align-items: center;
      justify-content: center; /* vertical */
    }
    /* Titre */
    .legend-titre {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        text-align: center;
    }

    /* Conteneur de la légende */
    .legend-list {
        max-height: 300px;          /* hauteur maximale souhaitée */
        overflow-y: auto;           /* barre de défilement verticale si dépassement */
        padding-right: 4px;         /* espace pour la barre de défilement */
    }

    /* Items de légende */
    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;            /* espacement plus compact */
        width: fit-content;
    }

    .legend-text {
        font-size: 10px;
        font-weight: 400;
    }
    /* Texte des options */
   /* .options-text {
        font-size: 8px;
        font-weight: 400;
    }*/

    /* Couleurs et points */
    .legend-color,
    .legend-point {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
    }
    .legend-color {
        border: 1px solid #666;
    }
    .legend-point {
        border-radius: 50%;
    }
   
    .js-plotly-plot .modebar {
      top: 40px !important;   /* décale vers le bas */
      right: 50px !important;
    }
    .color-row {
      display: grid;
      grid-template-columns: 130px 44px;
      align-items: center;
      margin-bottom: 8px;
    }

    .color-row > :first-child {
      width: auto;
    }
    .color-row, .checkbox-row {
    display: grid;
    grid-template-columns: 1fr auto;   /* texte à gauche, contrôle à droite */
    align-items: center;                /* alignement vertical */
    gap: 8px;                           /* espace horizontal */
    margin-bottom: 8px;
    }
    /* Alignement du contrôle (color picker ou switch) */
    .color-row input[type="color"], .color-row .switch, .checkbox-row .switch {
    justify-self: end;                 /* pousse le contrôle à droite */
    margin-right: 30px;
    }
   
    
    #textColorPicker, #textColorPickerEPCI, #lineColorPicker, #pointColorPicker, #pointColorPickerEPCI, #pointColorPickerMairies {
      width: 24px;
      height: 24px;
      padding: 0;
      border: 2px solid #ccc;
    }
    #pointColorPicker, #pointColorPickerEPCI, #pointColorPickerMairies {
      border-radius: 50%;
      flex-shrink: 0;
    }
    .separator {
      border: 0;
      border-top: 1px solid #d9d9d9; /* gris clair */
      margin: 8px 0;
    }
    .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    #fontSizeSlider, #fontSizeSliderEPCI {
        flex: 1;
    }

    #fontSizeValue, #fontSizeValueEPCI {
        min-width: 25px;
    }

    .switch-container {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 8px;
    }

    .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
        margin-left: 0px;
    }
  

    .switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        inset: 0;
        cursor: pointer;
        background-color: #ccc;
        border-radius: 24px;
        transition: .2s;
    }

    .slider:before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: .2s;
    }

    input:checked + .slider {
        background-color: #2196F3;
    }

    input:checked + .slider:before {
        transform: translateX(20px);
    }
    .font-size-control {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .options-text { 
        color: #08306B !important; /* Force la couleur bleu foncé au cas où un autre style l'écrase */
        font-size: 10px; 
        min-width: 24px; 
        text-align: right; 
        flex-shrink: 0; 
        display: inline-block; /* Assure que la largeur minimale est respectée */
    }
    .font-size-control label {
        white-space: nowrap;
        flex: 1;
    }

    .font-size-control input[type="range"] {
        flex: 2;
        min-width: 50px;
    }

    .titre {
      font-size: 18px;
      text-align: center;
      margin: 0;
      padding-top: 6px;
      flex: 0 0 auto;
    }

    .notOwner { 
      font-size: 10px;
      text-align: center;
      font-style: italic;
    }

    #showChoropletheDetails, #showCommuneTextDetails, #showMairiePointDetails,  #showEPCITextDetails , #showCommunePointDetails, #showEPCIPointDetails  {
        margin-left: 0.8rem;
    }
    .hidden { display:none; }
  </style>
</head>

      <div class="color-row">
          <label for="pointColorPicker">Couleur des points :</label>
          <input type="color" id="pointColorPicker" value="#000000">
      </div>
    </div>
    <div class="checkbox-row">
      <label>
          <input type="checkbox" id="showPointsValueMairies" >

      </label>

    <div id="showMairiePointDetails">

          <input type="range" id="pointSizeSliderMairies" min="1" max="6" value="3">
          <span id="pointSizeValueMairies" class="options-text">12</span>
      </div>
      <div class="color-row">
          <label for="pointColorPickerMairies">Couleur des points :</label>
          <input type="color" id="pointColorPickerMairies" value="#000000">
      </div>
    </div>
    <hr class="separator">
    <b>Regroupements</b> 
     <div class="checkbox-row">
      <label>
          <input type="checkbox" id="showTextValueEPCI" >
          Afficher le nom des EPCI
      </label>
    </div>
    <div id="showEPCITextDetails" >
      <div class="font-size-control">
          <label for="fontSizeSliderEPCI">Taille du texte :</label>
          <input type="range" id="fontSizeSliderEPCI" min="6" max="30" value="12">
          <span id="fontSizeValueEPCI" class="options-text">12</span>
      </div>
      <div class="color-row">
          <label for="textColorPickerEPCI">Couleur du texte :</label>
          <input type="color" id="textColorPickerEPCI" value="#000000">
      </div>
    </div>
    <div class="checkbox-row">
      <label for="showPointsValueEPCI">
          <input type="checkbox" id="showPointsValueEPCI" >
          Afficher les points des EPCI  <br/>(centre de l'EPCI, taille en fonction de "ValeurPointEPCI")
      </label>
    </div>
    <div id="showEPCIPointDetails">
      <div class="font-size-control">
          <label for="pointSizeSliderEPCI">Taille du point :</label>
          <input type="range" id="pointSizeSliderEPCI" min="1" max="6" value="3">
          <span id="pointSizeValueEPCI" class="options-text">12</span>
      </div>
      <div class="color-row">
          <label for="pointColorPickerEPCI">Couleur des points :</label>
          <input type="color" id="pointColorPickerEPCI" value="#000000">
      </div>
    </div>
    <hr class="separator">
    
    <div class="color-row" >
      <span class="options-text">Afficher le fond</span>
      <label class="switch">
          <input type="checkbox" id="showMap">
          <span class="slider"></span>
      </label>
    </div>   
    <div class="color-row" >
      <span class="options-text">Utiliser la carte DGOM</span>
      <label class="switch">
          <input type="checkbox" id="DGOMMap">
          <span class="slider"></span>
      </label>
    </div>  
     <div class="checkbox-row">
      <span class="options-text">Montrer la géographie <br/>(nom des îles)</span>
      <label class="switch">
          <input type="checkbox" id="showGeoValue">
          <span class="slider"></span>
      </label>
    </div> 
    <hr class="separator">
    <button id="saveMetricBtn">
      Enregistrer dans la métrique
    </button>
    <span id="notOwner" class="notOwner" >Vous n'avez pas la permission d'enregistrer d'options sur cette métrique</span>

  </div>

</div>

const fontSizeValue = document.getElementById("fontSizeValue");

const fontSizeValueMairie = document.getElementById("fontSizeValueMairie");

const fontSizeSliderEPCI = document.getElementById("fontSizeSliderEPCI");
const fontSizeValueEPCI = document.getElementById("fontSizeValueEPCI");
const textColorPickerEPCI = document.getElementById("textColorPickerEPCI");

const lineColorPicker = document.getElementById("lineColorPicker");
const lineWidthSlider = document.getElementById("lineWidthSlider");

syncShowMap();
// Mise à jour à chaque changement de l’état de DGOMMap
DGOMMapSwitch.addEventListener('change', syncShowMap);
openBtn.addEventListener("click", () => {
  const hidden = panel.classList.toggle("hidden");
  openBtn.text = hidden ? "Ouvrir les options" : "Fermer les options";
});

closeBtn.addEventListener("click", () => {
  panel.classList.add("hidden");
});
window.addEventListener("resize", () => {
  Plotly.Plots.resize(document.getElementById("chart"));
});

document.getElementById("cameraBtn").addEventListener("click", async () => {
  const chartDiv = document.getElementById("chart");
  const target = document.getElementById("main");

  try {
    // 1. On demande à Plotly de générer l'image PNG de la carte seule
    const plotlyImageData = await Plotly.toImage(chartDiv, {
      format: 'png',
      width: chartDiv.offsetWidth,
      height: chartDiv.offsetHeight,
      imageDataOnly: false
    });

    // 2. On crée l'image temporaire
    const tempImg = document.createElement('img');
    tempImg.src = plotlyImageData;
    tempImg.style.width = '100%';
    tempImg.style.height = '100%';
    tempImg.style.position = 'absolute'; // On la positionne par-dessus
    tempImg.style.top = '0';
    tempImg.style.left = '0';
    tempImg.style.zIndex = '100'; // Devant le graphique
    tempImg.id = 'temp-plotly-img';

    // On s'assure que le container sait accueillir l'absolute
    const originalPosition = chartDiv.style.position;
    if (!originalPosition || originalPosition === 'static') {
      chartDiv.style.position = 'relative';
    }

    // 3. On AJOUTE l'image par-dessus et on cache le vrai graphique proprement
    // (On ne touche PAS au innerHTML, on cache juste les éléments internes de Plotly)
    const plotlyMainSvg = chartDiv.querySelector('.js-plotly-plot');
    if (plotlyMainSvg) plotlyMainSvg.style.visibility = 'hidden'; 
    chartDiv.appendChild(tempImg);

    // 4. On laisse un tout petit délai pour le DOM
    await new Promise(resolve => setTimeout(resolve, 100));

    // Capture html2canvas
    const canvas = await html2canvas(target, {
      backgroundColor: "#ffffff",
      scale: 1,
      useCORS: true,
      allowTaint: true
    });

    // 5. RESTAURATION : On retire l'image et on réaffiche le Plotly intact
    const imgToRemove = document.getElementById('temp-plotly-img');
    if (imgToRemove) imgToRemove.remove();
    
    if (plotlyMainSvg) plotlyMainSvg.style.visibility = 'visible';
    chartDiv.style.position = originalPosition;

    // Optionnel mais recommandé pour rafraîchir le layout de la carte
    Plotly.Plots.resize(chartDiv);

    // 6. Téléchargement
    const image = canvas.toDataURL("image/png");
    const imageName = "Carte-" + metriqueNom + "-" + territoire + ".png";
    downloadImage(image, imageName);

  } catch (error) {
    console.error("Erreur lors de l'export :", error);
  }
});

async function loadGeoJson(geoJsonCell) {
  const attachments =
  await grist.docApi.fetchTable("_grist_Attachments");
  try {
    const attachmentId = geoJsonCell[1];
        const url = `${baseUrl}/attachments/${attachmentId}/download?auth=${token}`;
        const response = await fetch(url);

        const geojson = await response.json();

        return geojson;
        
      } catch (error) {
        console.error("Error downloading or encoding image:", error);
      }
}

async function refreshMap(sidePanel) {  
  territoire = document.getElementById("territoireSelect").value;
  console.log("territoire :" + territoire)
  const geoRow = territoireRows.find(r => r.territoire === territoire);
  console.log(geoRow)
  if (!geoRow) {
    document.getElementById("info").innerHTML = "problème à la récupération du territoire visé, faites un rafraîchissement de la page"
    Plotly.purge('chart');
    return;
  }
  console.log(dataRecords)
  let recordsTerr 
  if (geoRow.estFranceAll) {
    franceAll = true ;
    recordsTerr = dataRecords
  } else {
    recordsTerr = dataRecords.filter(r => r.territoire === territoire);
  }
  if (recordsTerr.length == 0) {
    document.getElementById("info").innerHTML = "Pas de données à afficher : il faut qu'il y ait des données pour le couple territoire/métrique";
    Plotly.purge('chart');
    return
  }
  const metriqueId = recordsTerr[0].MetriqueId;
  if (!sidePanel) {
    await initMetrique(metriqueId);
  }
  document.getElementById("info").innerHTML = "";
  document.getElementById("titre").innerHTML =  territoire + " - " + metriqueNom;

  const fmt = new Intl.NumberFormat('fr-FR');   // → utilise «  » (espace insécable) entre les groupes
  const latCentreCarte = DGOMMap ? (geoRow.latCentreCarteDGOM ? geoRow.latCentreCarteDGOM : geoRow.latCentreCarte) : geoRow.latCentreCarte;
  const longCentreCarte = DGOMMap ? (geoRow.longCentreCarteDGOM ? geoRow.longCentreCarteDGOM : geoRow.longCentreCarte) : geoRow.longCentreCarte;  
  const zoomCarte = DGOMMap ? (geoRow.zoomCarteDGOM ? geoRow.zoomCarteDGOM : geoRow.zoomCarte) : geoRow.zoomCarte ;   

  const geoJsonDGOMSafe = geoRow.geoJsonDGOM ? geoRow.geoJsonDGOM : geoRow.geoJson
  let geoJsonCell
  if (franceAll) { //France entière => carte DGOM
    geoJsonCell = geoRow.geoJsonDGOM2
    DGOMMapSwitch.checked = true;
    DGOMMap = true ;
    syncShowMap();
  } else {
    geoJsonCell = DGOMMap ? geoJsonDGOMSafe : geoRow.geoJson ; 
  }

  const geojson = await loadGeoJson(geoJsonCell);
  delete geojson.crs
  let cleanedGeojson = geojson;
  if (validateGeoJSON(geojson).length > 0) {
    cleanedGeojson = fixGeoJSON(geojson);
    validateGeoJSON(cleanedGeojson)
  } 
  const records = recordsTerr.filter(r => r.MetriqueId === metriqueId);
  const colorsSet = [...new Set(records.map(r => Number(r.ValeurChoroplethe)))].sort((a, b) => a - b);
  const colorscale = metriqueCouleurCat ? buildColorscale(colorsSet) : metriqueType; 
  const traces = [];        

  // --- COUCHES CHOROPLETHE (MAPBOX) ---
  if (showChoroplethe) {
    let baseChoropleth = {
    type: 'choroplethmapbox', // Changement ici
    geojson: cleanedGeojson,
    locations: records.map(r => String(r.Code_Insee)),
    featureidkey: 'properties.code_insee',
    colorscale: colorscale,
    showscale: false,
    hoverinfo: 'skip',
    marker: {
      line: {
        color: lineColor,
        width: lineWidth/10
        }
      }
    };

    if (metriqueType === "categorie") {
      baseChoropleth.z = records.map(r => Number(r.ValeurChoroplethe));
      traces.push(baseChoropleth);
    } else if (metriqueType === "seuils") {
      baseChoropleth.z = records.map(r => {
        const v = Number(r.ValeurChoroplethe);
        if (v < metriqueSeuil1) return 1;
        if (v <= metriqueSeuil2) return 2;
        return 3;
      });
      traces.push(baseChoropleth);
    } else {
      baseChoropleth.z = records.map(r => {
        const v = Number(r.ValeurChoroplethe);
        return v;
      });
      baseChoropleth.colorscale = metriqueType;
      baseChoropleth.showscale = true;
      traces.push(baseChoropleth);
    }
  }
  

  // --- COUCHE POINTS COMMUNES (MAPBOX) ---
  if (showPoints) {
    let maxValue;
    let markerSizes;
    if (popPourPtCommunes) {
      maxValue = Math.max(...records.map(r => Number(r.ValeurPop)));
      markerSizes = records.map(r =>
      Math.sqrt(Number(r.ValeurPop) / maxValue) * 40 * pointSize / 3 );
    } else {
      maxValue = Math.max(...records.map(r => Number(r.ValeurPointCommune)));
      markerSizes = records.map(r =>
      Math.sqrt(Number(r.ValeurPointCommune) / maxValue) * 40 * pointSize / 3 );
    }
    traces.push({
      type: 'scattermapbox',
      lon:  franceAll ? records.map(r => Number(r.longDGOM2)) : showPointsAtMairies ? (DGOMMap ? records.map(r => Number(r.longMairieDGOM)) : records.map(r => Number(r.longMairie)) ) : (DGOMMap ? records.map(r => Number(r.longDGOM)) : records.map(r => Number(r.long)) ),
      lat: franceAll ? records.map(r => Number(r.latDGOM2)) : showPointsAtMairies ? (DGOMMap ? records.map(r => Number(r.latMairieDGOM)) : records.map(r => Number(r.latMairie)) ) : (DGOMMap ? records.map(r => Number(r.latDGOM)) : records.map(r => Number(r.lat)) ),
      mode: 'markers',
      showlegend: false, 
      marker: {
        size: markerSizes,
        color: pointColor,
        opacity: 0.7,
        line: { width: 1, color: 'white' } 
      },
      text: popPourPtCommunes ? records.map(r => `${r.Nom}<br>${textPointsUnit} : ${fmt.format(r.ValeurPop)}`) : records.map(r => `${r.Nom}<br>${textPointsUnit} : ${fmt.format(r.ValeurPointCommune)}`),
      hovertemplate: '%{text}<extra></extra>'
    });
  }

  // --- COUCHE POINTS Mairie  ---
  if (showPointsMairies) {    
    traces.push({
      type: 'scattermapbox', 
      lon: DGOMMap ? records.map(r => Number(r.longMairieDGOM)) : records.map(r => Number(r.longMairie)),
      lat: DGOMMap ? records.map(r => Number(r.latMairieDGOM)) : records.map(r => Number(r.latMairie)),
      mode: 'markers',
      showlegend: false, 
      marker: {
        size: pointSizeMairies * 5,
        color: pointColorMairies,
        opacity: 1,
        line: { width: 1, color: 'white' } // Note : Mapbox gère parfois mal les contours de markers natifs, l'alternative est de doubler la trace
      },
      hoverinfo: 'skip'
    });
  }

  // --- COUCHE POINTS EPCI (MAPBOX) ---
  if (showPointsEPCI) {
    let maxValueEPCI;
    let markerSizesEPCI;
    const uniqueRecords = [
      ...new Map(records.map(r => [`${r.latEPCI}|${r.longEPCI}`, r])).values()
    ];
    if (popPourPtEPCI) {
      maxValueEPCI = Math.max(...records.map(r => Number(r.ValeurPopEPCI)));
      markerSizesEPCI  = uniqueRecords.map(r =>
      Math.sqrt(Number(r.ValeurPopEPCI) / maxValueEPCI) * 40 * pointSizeEPCI / 3 );
    } else {
      maxValueEPCI = Math.max(...records.map(r => Number(r.ValeurPointEPCI)));
      markerSizesEPCI  = uniqueRecords.map(r =>
      Math.sqrt(Number(r.ValeurPointEPCI) / maxValueEPCI) * 40 * pointSizeEPCI / 3 );
    }

    traces.push({
      type: 'scattermapbox', // Changement ici
      lon: franceAll ? uniqueRecords.map(r => Number(r.longEPCIDGOM2)) : DGOMMap ? uniqueRecords.map(r => Number(r.longEPCIDGOM)) : uniqueRecords.map(r => Number(r.longEPCI)),
      lat: franceAll ? uniqueRecords.map(r => Number(r.latEPCIDGOM2)) : DGOMMap ?  uniqueRecords.map(r => Number(r.latEPCIDGOM)) : uniqueRecords.map(r => Number(r.latEPCI)),
      mode: 'markers',
      showlegend: false, 
      marker: {
        size: markerSizesEPCI,
        color: pointColorEPCI,
        opacity: 0.7
      },
      // Correction ici : uniqueRecords au lieu de records pour éviter le décalage de taille/texte
      text: popPourPtEPCI ? uniqueRecords.map(r => `${r.NomEPCI}<br>${textPointsUnitEPCI} : ${fmt.format(r.ValeurPopEPCI)}`) : uniqueRecords.map(r => `${r.Nom}<br>${textPointsUnitEPCI} : ${fmt.format(r.ValeurPointEPCI)}`),
      hovertemplate: '%{text}<extra></extra>'
    });
  }

  // --- COUCHE TEXTE COMMUNES (MAPBOX) ---
  if (showText) {    
    traces.push({
      type: 'scattermapbox', // Changement ici
      lon: franceAll ? records.map(r => Number(r.longDGOM2)) : showTextMairies ? (DGOMMap ? records.map(r => Number(r.longMairieDGOM)) : records.map(r => Number(r.longMairie))) : (DGOMMap ? records.map(r => Number(r.longDGOM)) : records.map(r => Number(r.long))),
      lat: franceAll ? records.map(r => Number(r.latDGOM2)) : showTextMairies ? (DGOMMap ? records.map(r => Number(r.latMairieDGOM)) : records.map(r => Number(r.latMairie))) : (DGOMMap ? records.map(r => Number(r.latDGOM)) : records.map(r => Number(r.lat))),
      mode: 'text',
      text: records.map(r => r.Nom),
      showlegend: false, 
      textfont: {
        size: textSize,
        color: textColor
      },
      hoverinfo: 'skip',
    });
  }

  if (showGeo) {
    let uniqueRecords = [] 
    if (DGOMMap) {
        uniqueRecords = [
        ...new Map(records.map(r => [`${r.latGeoDGOM}|${r.longGeoDGOM}`, r])).values()
      ];
    } else {
      uniqueRecords = [
        ...new Map(records.map(r => [`${r.latGeo}|${r.longGeo}`, r])).values()
      ];
    }
    traces.push({
      type: 'scattermapbox', // Changement ici
      lon: franceAll ? uniqueRecords.map(r => Number(r.longGeoDGOM2)) : DGOMMap ? uniqueRecords.map(r => Number(r.longGeoDGOM)) : uniqueRecords.map(r => Number(r.longGeo)),
      lat: franceAll ? uniqueRecords.map(r => Number(r.latGeoDGOM2)) : DGOMMap ? uniqueRecords.map(r => Number(r.latGeoDGOM)) : uniqueRecords.map(r => Number(r.latGeo)),
      mode: 'text',
      text: uniqueRecords.map(r => r.nomGeo),
      showlegend: false, 
      textfont: {
        size: 16,
        color: "#08306B"
      }
    });
  }

  // --- COUCHE TEXTE EPCI (MAPBOX) ---
  if (showTextEPCI) {
    const seen = new Set();
    const uniqueRecords = records.filter(r => {

function buildLegend(records) {

  titre.className = "legend-titre";
  titre.innerHTML = `<span>${titreLegende}</span>`
  legend.appendChild(titre);  
  const colors = metriqueCouleurCat.split(',');
  const noms = metriqueNomCat.split(','); 

  // CAS 1 : Catégorie
  if (metriqueType == "categorie") {
    
    const categories = [...new Set(
      records.map(r => Number(r.ValeurChoroplethe))
    )].sort((a,b) => a - b);
    const liste = document.createElement("div");
    liste.className = "legend-list";
    legend.appendChild(liste);
    categories.forEach(cat => {
      const color = colors[cat - 1];
      let label =""
      if (EPCIestLaLegende) {
        label = records.find(r => Number(r.ValeurChoroplethe) == cat )?.NomEPCI || cat;
      } else {
        label = noms[cat-1];
      }
      const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `
        <div class="legend-color"
            style="background:${color}">
        </div>
        <span class="legend-text">${label}</span>
      `;
      liste.appendChild(item);
    });
  }

  if (metriqueType === "seuils") {
    const colors = metriqueCouleurCat.split(",");
    const classes = [
      {
        label: `< ${metriqueSeuil1}`,
        color: colors[0]
      },
      {
        label: ` ${metriqueSeuil1} < valeur < ${metriqueSeuil2}`,
        color: colors[1]
      },
      {
        label: `> ${metriqueSeuil2}`,
        color: colors[2]
      }
    ];

    classes.forEach(c => {

      const item = document.createElement("div");
      item.className = "legend-item";

      item.innerHTML = `
        <div class="legend-color"
             style="background:${c.color}">
        </div>
        <span>${c.label}</span>
      `;

      legend.appendChild(item);
    });
  }
  if (showPoints) {
    const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `
        <div class="legend-point"
             style="background:${pointColor}">
        </div>
        <span class="legend-text">${textPointsUnit}</span>
      `
    legend.appendChild(item);
  }
  if (showPointsEPCI) {
    const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `
        <div class="legend-point"
             style="background:${pointColorEPCI}">
        </div>
        <span class="legend-text">${textPointsUnitEPCI}</span>
      `
    legend.appendChild(item);
  }
}

function buildColorscale(liste) { 
  const colors = metriqueCouleurCat.split(',');  
  const scale = []; 

  if (metriqueType === "seuils") { 
    const n=3
    for (let i = 0; i < n; i++) {
      const start = i / n;
      const end = (i + 1) / n;
      scale.push([start, colors[i]]);
      scale.push([end, colors[i]]);
    }
  }
  if (metriqueType === "categorie") {
    const n = liste.length; 
    for (let i = 0; i < n; i++) {
      const start = i / n;
      const end = (i + 1) / n;

      scale.push([start, colors[i]]);
      scale.push([end, colors[i]]);
    }
  }
  return scale; 
}

function validateGeoJSON(fc) {
  const errors = [];

  fc.features.forEach((feature, index) => {
    const result = validateFeature(feature);
    if (!result.valid) {
      errors.push({
        feature: index,
        ...result
      });
    }
    
  });
  return errors;
}

function cleanGeoJSON(fc) {
  return {
    ...fc,
    features: fc.features.map(feature => {
      if (!feature.geometry) return feature;
      
      if (feature.geometry.type === 'Polygon') {
        return {
          ...feature,
          geometry: {
            ...feature.geometry,
            // Garder uniquement le premier ring (contour extérieur)
            coordinates: [feature.geometry.coordinates[0]]
          }
        };
      }
      
      if (feature.geometry.type === 'MultiPolygon') {
        return {
          ...feature,
          geometry: {
            ...feature.geometry,
            coordinates: feature.geometry.coordinates.map(polygon => [polygon[0]])
          }
        };
      }
      
      return feature;
    })
  };
}

function ringArea(coords) {
  let area = 0;
  for (let i = 0; i < coords.length - 1; i++) {
    area += (coords[i][0] * coords[i+1][1]) - (coords[i+1][0] * coords[i][1]);
  }
  return area / 2;
}

function fixPolygonWindings(coordinates) {
  return coordinates.map((ring, index) => {
    const area = ringArea(ring);
    if (index === 0 && area < 0) return [...ring].reverse(); // extérieur = CCW
    if (index > 0 && area > 0) return [...ring].reverse();   // trou = CW
    return ring;
  });
}

function fixGeoJSON(fc) {
  return {
    ...fc,
    features: fc.features.map(feature => {
      if (!feature.geometry) return feature;

      if (feature.geometry.type === 'Polygon') {
        return {
          ...feature,
          geometry: {
            ...feature.geometry,
            coordinates: fixPolygonWindings(feature.geometry.coordinates)
          }
        };
      }

      if (feature.geometry.type === 'MultiPolygon') {
        return {
          ...feature,
          geometry: {
            ...feature.geometry,
            coordinates: feature.geometry.coordinates.map(fixPolygonWindings)
          }
        };
      }

      return feature;
    })
  };
}


function validateFeature(feature) {
  try {
    const reader = new jsts.io.GeoJSONReader();
    const geom = reader.read(feature.geometry);

    const validator = new jsts.operation.valid.IsValidOp(geom);

    const error = validator.getValidationError();

    if (error) {
      return {
        valid: false,
        message: error.getMessage(),
        coordinate: error.getCoordinate()
      };
    }

    return { valid: true };

  } catch (e) {
    return {
      valid: false,
      message: e.message
    };
  }
}
